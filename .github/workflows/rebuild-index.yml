# .github/workflows/rebuild-index.yml
name: Rebuild Matching Engine Index

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger index rebuild
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/internal/rebuild-index \
            -H "Authorization: Bearer ${{ secrets.REBUILD_SECRET }}" \
            -H "Content-Type: application/json")
          
          echo "Response code: $response"
          
          if [ "$response" != "200" ]; then
            echo "Rebuild failed with status $response"
            exit 1
          fi
          
          echo "Rebuild triggered successfully"
